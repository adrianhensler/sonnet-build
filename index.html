<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Particle Gallery</title>
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07090f;
      --surface: rgba(12, 18, 32, 0.90);
      --border:  rgba(100, 140, 210, 0.18);
      --text:    #d8e4ff;
      --muted:   #7a90b8;
      --accent:  #4f8fff;
    }

    body {
      background: radial-gradient(ellipse 120% 60% at 50% 0%, #0e1830 0%, var(--bg) 65%);
      color: var(--text);
      font-family: Inter, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .gallery-header {
      text-align: center;
      padding: 3.5rem 1rem 2rem;
      position: relative;
    }
    .gallery-header::after {
      content: '';
      display: block;
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.2rem auto 0;
    }
    .gallery-header h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7eb3ff 0%, #b0caff 50%, #7eb3ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gallery-header p {
      color: var(--muted);
      margin-top: 0.6rem;
      font-size: 1.05rem;
      max-width: 520px;
      margin-inline: auto;
      line-height: 1.55;
    }

    /* ── Card grid ───────────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 0.75rem;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.25rem 5rem;
    }

    .preset-card {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(145deg, rgba(16,24,44,0.95), rgba(8,14,28,0.95));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1rem 0.85rem;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      will-change: transform;
    }
    .preset-card:hover {
      transform: translateY(-4px);
      border-color: rgba(140, 190, 255, 0.45);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .preset-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .card-num {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }
    .card-name {
      font-size: 1.0rem;
      font-weight: 700;
      line-height: 1.25;
      margin-top: 0.1rem;
    }
    .card-text {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.05rem;
    }
    .card-swatches {
      display: flex;
      gap: 5px;
      margin-top: 0.65rem;
      flex-wrap: wrap;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .gallery-footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    .gallery-footer a { color: var(--accent); text-decoration: none; }
    .gallery-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header class="gallery-header">
    <h1>Text Particle Gallery</h1>
    <p>Pick a preset below to watch your text explode into a swirling vortex of particles.</p>
  </header>
  <nav style="max-width:1280px;margin:0 auto 1.25rem;padding:0 1.25rem;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center">
    <a class="preset-card" style="padding:.6rem .9rem;min-width:unset" href="index.html">Main build</a>
    <a class="preset-card" style="padding:.6rem .9rem;min-width:unset" href="index-cheap-v1.html">Cheap version 1</a>
    <a class="preset-card" style="padding:.6rem .9rem;min-width:unset" href="index-cheap-v2.html">Cheap version 2</a>
  </nav>


  <!-- Cards are injected here by gallery.js -->
  <main id="preset-grid" class="card-grid" aria-label="Preset gallery"></main>

  <footer class="gallery-footer">
    <p>
      Powered by <a href="https://threejs.org" target="_blank" rel="noopener">Three.js</a>.
      Open <code>index.html</code> via any static server — see <a href="README.md">README</a> for instructions.
    </p>
  </footer>

  <script type="module" src="js/gallery.js"></script>
</body>
</html>
